<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPER HUB</title>
    <style>
        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #00d2ff;
            text-shadow: 0 0 10px #00d2ff, 0 0 20px #00d2ff;
            font-size: 2.5rem;
            margin-bottom: 25px;
            font-weight: bold;
        }

        /* Das originale 2x2 Kachel-Raster */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 440px;
            margin: 0 auto 35px auto;
            padding: 0 10px;
        }

        .stat-card {
            background-color: #131a26;
            border-radius: 12px;
            padding: 20px 10px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: bold;
            color: #00d2ff;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #858fbb;
            letter-spacing: 1px;
            font-weight: 600;
        }

        /* Key System Bereich */
        .key-box {
            background: #131a26;
            border: 2px solid #9d4edd;
            box-shadow: 0 0 15px rgba(157, 78, 221, 0.5);
            border-radius: 12px;
            padding: 20px;
            max-width: 400px;
            margin: 0 auto 40px auto;
        }

        .key-box h3 {
            color: #9d4edd;
            margin-top: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        input[type="text"] {
            width: 85%;
            padding: 12px;
            background-color: #0b0f19;
            border: 1px solid #00d2ff;
            border-radius: 8px;
            color: white;
            text-align: center;
            font-size: 1rem;
            outline: none;
            margin-bottom: 15px;
        }

        input[type="text"]:focus {
            box-shadow: 0 0 8px #00d2ff;
        }

        .submit-btn {
            background-color: #131a26;
            color: #9d4edd;
            border: 1px solid #9d4edd;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 90%;
            transition: all 0.2s;
            box-shadow: 0 0 5px rgba(157, 78, 221, 0.3);
        }

        .submit-btn:hover {
            background-color: #9d4edd;
            color: #131a26;
            box-shadow: 0 0 12px #9d4edd;
        }

        .status-message {
            margin-top: 15px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* Grid & Blöcke */
        .hub-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .block {
            background: #131a26;
            border: 2px solid #00d2ff;
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            opacity: 0.3;
            pointer-events: none;
        }

        .block.unlocked {
            opacity: 1;
            pointer-events: auto;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }

        .block:hover.unlocked {
            transform: translateY(-5px);
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.5);
        }

        .block h2 {
            margin-top: 0;
            color: #00d2ff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .block p {
            color: #858fbb;
            font-size: 0.95rem;
        }

        .copy-btn {
            background-color: #131a26;
            color: #00d2ff;
            border: 1px solid #00d2ff;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            box-shadow: 0 0 10px #00d2ff;
            background-color: rgba(0, 210, 255, 0.05);
        }

        .copy-btn.copied {
            background-color: #2ec4b6 !important;
            color: #131a26 !important;
            border-color: #2ec4b6 !important;
            box-shadow: 0 0 15px #2ec4b6 !important;
        }

        .game-banner {
            width: 100%;
            max-height: 180px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <h1>⚡ SUPER HUB</h1>
    
    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-value">10</span>
            <span class="stat-label">Scripts</span>
        </div>
        <div class="stat-card">
            <span class="stat-value">100%</span>
            <span class="stat-label">Kostenlos</span>
        </div>
        <div class="stat-card">
            <span class="stat-value">24/7</span>
            <span class="stat-label">Verfügbar</span>
        </div>
        <div class="stat-card">
            <span class="stat-value">Aktiv</span>
            <span class="stat-label">Status</span>
        </div>
    </div>

    <div class="key-box">
        <h3>🔑 Enter Key to Unlock Hub</h3>
        <input type="text" id="keyInput" placeholder="Enter Key Here...">
        <button class="submit-btn" onclick="checkKey()">Submit Key</button>
        <div id="status" class="status-message" style="color: #858fbb;">Locked 🔒</div>
    </div>

    <div class="hub-container">

        <div class="block" id="block1">
            <img src="https://cdn.discordapp.com/attachments/1516375399645581434/1516549532396032120/image0.jpg?ex=6a330c50&is=6a31bad0&hm=2eb861b030dba3d5b33f823dae3eeb063cc58764ee79c057372136e1b5844936&" alt="Game Banner" class="game-banner">
            <h2>🏴‍☠️ Blox Fruits</h2>
            <p>Hermanos Hub - Best Bounty & Auto Farm Script</p>
            <button class="copy-btn" onclick="copyScript(this, `loadstring(game:HttpGet('https://raw.githubusercontent.com/hermanos-dev/hermanos-hub/refs/heads/main/Loader.lua'))()`)">Copy Script</button>
        </div>

        <div class="block" id="block2">
            <img src="https://cdn.discordapp.com/attachments/1516375399645581434/1516551977994031215/IMG_2772.png?ex=6a330e97&is=6a31bd17&hm=1df311fb6d95372f07e978a9fcf3ea9d37056259563f9b466b35bd35d46f0f7d&" alt="Game Banner" class="game-banner">
            <h2>⚔️ Blox Fruits [All in ONE]</h2>
            <p>Fake Admin, Raids, Auto Farm, Quests & More!</p>
            <button class="copy-btn" onclick="copyScript(this, `loadstring(game:HttpGet(&quot;https://raw.githubusercontent.com/flazhy/QuantumOnyx/refs/heads/main/QuantumOnyx.lua&quot;))()`)">Copy Script</button>
        </div>

    </div>

    <script>
        const correctKey = "super-hub777"; 

        function checkKey() {
            const input = document.getElementById("keyInput").value.toLowerCase().trim();
            const status = document.getElementById("status");
            const blocks = document.querySelectorAll(".block");

            if (input === correctKey) {
                status.innerText = "Access Granted! ✅ Unlocked";
                status.style.color = "#2ec4b6";
                document.getElementById("keyInput").style.borderColor = "#2ec4b6";
                
                blocks.forEach(block => {
                    block.classList.add("unlocked");
                });
            } else if (input === "") {
                status.innerText = "Please enter a key! ⚠️";
                document.getElementById("keyInput").style.borderColor = "#00d2ff";
                
                blocks.forEach(block => {
                    block.classList.remove("unlocked");
                });
            } else {
                status.innerText = "Wrong Key! ❌ Try Again";
                status.style.color = "#ff4b4b";
                document.getElementById("keyInput").style.borderColor = "#ff4b4b";
                
                blocks.forEach(block => {
                    block.classList.remove("unlocked");
                });
            }
        }

        function copyScript(button, scriptText) {
            navigator.clipboard.writeText(scriptText).then(() => {
                const originalText = button.innerText;
                button.innerText = "Copied! ✅";
                button.classList.add("copied");
                
                setTimeout(() => {
                    button.innerText = originalText;
                    button.classList.remove("copied");
                }, 2000);
            }).catch(err => {
                alert("Fehler beim Kopieren: " + err);
            });
        }
    </script>

</body>
</html>
