<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIDA SUPER HUB</title>
    <style>
        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #00d2ff;
            text-shadow: 0 0 10px #00d2ff, 0 0 20px #00d2ff;
            font-size: 2.5rem;
            margin-bottom: 25px;
        }

        /* DIE ORIGINALEN KÄSTEN/BADGES AUS DEM ALTEN SCRIPT */
        .badge-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .badge {
            background: rgba(0, 210, 255, 0.05);
            border: 1px solid #00d2ff;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: bold;
            color: #00d2ff;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Key System Bereich */
        .key-box {
            background: #131a26;
            border: 2px solid #9d4edd;
            box-shadow: 0 0 15px rgba(157, 78, 221, 0.5);
            border-radius: 12px;
            padding: 20px;
            max-width: 400px;
            margin: 0 auto 40px auto;
        }

        .key-box h3 {
            color: #9d4edd;
            margin-top: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        input[type="text"] {
            width: 85%;
            padding: 12px;
            background-color: #0b0f19;
            border: 1px solid #00d2ff;
            border-radius: 8px;
            color: white;
            text-align: center;
            font-size: 1rem;
            outline: none;
            margin-bottom: 15px;
        }

        input[type="text"]:focus {
            box-shadow: 0 0 8px #00d2ff;
        }

        .submit-btn {
            background-color: #131a26;
            color: #9d4edd;
            border: 1px solid #9d4edd;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 90%;
            transition: all 0.2s;
            box-shadow: 0 0 5px rgba(157, 78, 221, 0.3);
        }

        .submit-btn:hover {
            background-color: #9d4edd;
            color: #131a26;
            box-shadow: 0 0 12px #9d4edd;
        }

        .status-message {
            margin-top: 15px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* Grid & Blöcke aus dem Original-Design */
        .hub-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .block {
            background: #131a26;
            border: 2px solid #00d2ff;
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            opacity: 0.3; /* Komplett ausgegraut wenn locked */
            pointer-events: none;
        }

        .block.unlocked {
            opacity: 1;
            pointer-events: auto;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }

        .block:hover.unlocked {
            transform: translateY(-5px);
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.5);
        }

        .block h2 {
            margin-top: 0;
            color: #00d2ff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .block p {
            color: #858fbb;
            font-size: 0.95rem;
        }

        /* ORIGINALER GREEN-TOGGLE-BUTTON BEIM KOPIEREN */
        .copy-btn {
            background-color: #131a26;
            color: #00d2ff;
            border: 1px solid #00d2ff;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            box-shadow: 0 0 10px #00d2ff;
            background-color: rgba(0, 210, 255, 0.05);
        }

        .copy-btn.copied {
            background-color: #2ec4b6 !important;
            color: #131a26 !important;
            border-color: #2ec4b6 !important;
            box-shadow: 0 0 15px #2ec4b6 !important;
        }
    </style>
</head>
<body>

    <h1>⚡ VIDA SUPER HUB ⚡</h1>
    
    <div class="badge-container">
        <div class="badge">🔥 100% FREE</div>
        <div class="badge">🚀 NO KEY IN-GAME</div>
        <div class="badge">🛠️ MOBILE OPTIMIZED</div>
    </div>

    <div class="key-box">
        <h3>🔑 Enter Key to Unlock Hub</h3>
        <input type="text" id="keyInput" placeholder="Enter Key Here...">
        <button class="submit-btn" onclick="checkKey()">Submit Key</button>
        <div id="status" class="status-message" style="color: #858fbb;">Locked 🔒</div>
    </div>

    <div class="hub-container">

        <div class="block" id="block1">
            <h2>🏴‍☠️ Blox Fruits</h2>
            <p>Hermanos Hub - Best Bounty & Auto Farm Script</p>
            <button class="copy-btn" onclick="copyScript(this, `loadstring(game:HttpGet('https://raw.githubusercontent.com/hermanos-dev/hermanos-hub/refs/heads/main/Loader.lua'))()`)">Copy Script</button>
        </div>

        <div class="block" id="block2">
            <h2>🎮 Block 2</h2>
            <p>Coming Soon...</p>
            <button class="copy-btn" onclick="copyScript(this, '-- Soon')">Copy Script</button>
        </div>

    </div>

    <script>
        const correctKey = "super-hub777"; 

        function checkKey() {
            const input = document.getElementById("keyInput").value.toLowerCase().trim();
            const status = document.getElementById("status");
            const blocks = document.querySelectorAll(".block");

            if (input === correctKey) {
                status.innerText = "Access Granted! ✅ Unlocked";
                status.style.color = "#2ec4b6";
                document.getElementById("keyInput").style.borderColor = "#2ec4b6";
                
                blocks.forEach(block => {
                    block.classList.add("unlocked");
                });
            } else if (input === "") {
                status.innerText = "Please enter a key! ⚠️";
                status.style.color = "#858fbb";
                document.getElementById("keyInput").style.borderColor = "#00d2ff";
                
                blocks.forEach(block => {
                    block.classList.remove("unlocked");
                });
            } else {
                status.innerText = "Wrong Key! ❌ Try Again";
                status.style.color = "#ff4b4b";
                document.getElementById("keyInput").style.borderColor = "#ff4b4b";
                
                blocks.forEach(block => {
                    block.classList.remove("unlocked");
                });
            }
        }

        /* Der originale Kopier-Effekt (Button wird grün, kein nerviges Browser-Popup) */
        function copyScript(button, scriptText) {
            navigator.clipboard.writeText(scriptText).then(() => {
                const originalText = button.innerText;
                button.innerText = "Copied! ✅";
                button.classList.add("copied");
                
                // Nach 2 Sekunden wechselt der Button automatisch zurück zum Standard
                setTimeout(() => {
                    button.innerText = originalText;
                    button.classList.remove("copied");
                }, 2000);
            }).catch(err => {
                alert("Fehler beim Kopieren: " + err);
            });
        }
    </script>

</body>
</html>
