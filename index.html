<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPER HUB</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
            font-size: 2.5rem;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 440px;
            margin: 0 auto 35px auto;
            padding: 0 10px;
        }

        .stat-card {
            background-color: #111111;
            border-radius: 12px;
            padding: 20px 10px;
            border: 1px solid #222222;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #666666;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .key-box {
            background: #111111;
            border: 2px solid #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 20px;
            max-width: 400px;
            margin: 0 auto 40px auto;
        }

        .key-box h3 {
            color: #ffffff;
            margin-top: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        input[type="text"] {
            width: 85%;
            padding: 12px;
            background-color: #000000;
            border: 1px solid #333333;
            border-radius: 8px;
            color: white;
            text-align: center;
            font-size: 1rem;
            outline: none;
            margin-bottom: 15px;
        }

        input[type="text"]:focus {
            box-shadow: 0 0 8px #ffffff;
            border-color: #ffffff;
        }

        .submit-btn {
            background-color: #111111;
            color: #ffffff;
            border: 1px solid #ffffff;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 90%;
            transition: all 0.2s;
        }

        .submit-btn:hover {
            background-color: #ffffff;
            color: #000000;
            box-shadow: 0 0 12px #ffffff;
        }

        .status-message {
            margin-top: 15px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .hub-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .block {
            background: #111111;
            border: 2px solid #222222;
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            opacity: 0.3;
            pointer-events: none;
        }

        .block.unlocked {
            opacity: 1;
            pointer-events: auto;
            border-color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .block:hover.unlocked {
            transform: translateY(-5px);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.25);
        }

        .block h2 {
            margin-top: 0;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .block p {
            color: #888888;
            font-size: 0.95rem;
        }

        .copy-btn {
            background-color: #111111;
            color: #ffffff;
            border: 1px solid #ffffff;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            box-shadow: 0 0 10px #ffffff;
            background-color: rgba(255, 255, 255, 0.05);
        }

        .copy-btn.copied {
            background-color: #ffffff !important;
            color: #000000 !important;
            border-color: #ffffff !important;
            box-shadow: 0 0 15px #ffffff !important;
        }

        /* Perfekter Style für Videos und Bilder */
        .game-banner {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
            display: block;
            border: none;
        }
    </style>
</head>
<body>

    <h1>⚡ SUPER HUB</h1>
    
    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-value">10</span>
            <span class="stat-label">Scripts</span>
        </div>
        <div class="stat-card">
            <span class="stat-value">100%</span>
            <span class="stat-label">Kostenlos</span>
        </div>
        <div class="stat-card">
            <span class="stat-value">24/7</span>
            <span class="stat-label">Verfügbar</span>
        </div>
        <div class="stat-card">
            <span class="stat-value">Aktiv</span>
            <span class="stat-label">Status</span>
        </div>
    </div>

    <div class="key-box">
        <h3>🔑 Enter Key to Unlock Hub</h3>
        <input type="text" id="keyInput" placeholder="Enter Key Here...">
        <button class="submit-btn" onclick="checkKey()">Submit Key</button>
        <div id="status" class="status-message" style="color: #666666;">Locked 🔒</div>
    </div>

    <div class="hub-container">

        <div class="block" id="block1">
            <video class="game-banner" autoplay loop muted playsinline>
                <source src="https://streamable.com/video/mp4/rrulf1.mp4" type="video/mp4">
                Ihr Browser unterstützt dieses Video nicht.
            </video>
            <h2>🏴‍☠️ Blox Fruits</h2>
            <p>Hermanos Hub - Best Bounty & Auto Farm Script</p>
            <button class="copy-btn" onclick="copyScript(this, `loadstring(game:HttpGet('https://raw.githubusercontent.com/hermanos-dev/hermanos-hub/refs/heads/main/Loader.lua'))()`)">Copy Script</button>
        </div>

        <div class="block" id="block2">
            <img src="https://images.prodia.xyz/744fb8f0-48fe-4098-824e-0f09d455d4f5.png" alt="Game Banner" class="game-banner">
            <h2>⚔️ Blox Fruits [All in ONE]</h2>
            <p>Fake Admin, Raids, Auto Farm, Quests & More!</p>
            <button class="copy-btn" onclick="copyScript(this, `loadstring(game:HttpGet(&quot;https://raw.githubusercontent.com/flazhy/QuantumOnyx/refs/heads/main/QuantumOnyx.lua&quot;))()`)">Copy Script</button>
        </div>

        <div class="block" id="block3">
            <img src="https://images.prodia.xyz/744fb8f0-48fe-4098-824e-0f09d455d4f5.png" alt="Game Banner" class="game-banner">
            <h2>🎯 Rivals</h2>
            <p>Aimbot, Infinite Double Jump, ESP & More!</p>
            <button class="copy-btn" onclick="copyScript(this, `loadstring(game:HttpGet(&quot;https://raw.githubusercontent.com/awakeningswifters/LexusHubLoader/refs/heads/main/Loader.lua&quot;))()`)">Copy Script</button>
        </div>

    </div>

    <script>
        const correctKey = "super-hub777"; 

        function checkKey() {
            const input = document.getElementById("keyInput").value.toLowerCase().trim();
            const status = document.getElementById("status");
            const blocks = document.querySelectorAll(".block");

            if (input === correctKey) {
                status.innerText = "Access Granted! ✅ Unlocked";
                status.style.color = "#ffffff";
                document.getElementById("keyInput").style.borderColor = "#ffffff";
                
                blocks.forEach(block => {
                    block.classList.add("unlocked");
                    // Startet das Video automatisch nach dem Unlocken
                    const video = block.querySelector("video");
                    if (video) video.play();
                });
            } else if (input === "") {
                status.innerText = "Please enter a key! ⚠️";
                document.getElementById("keyInput").style.borderColor = "#ffffff";
                
                blocks.forEach(block => {
                    block.classList.remove("unlocked");
                });
            } else {
                status.innerText = "Wrong Key! ❌ Try Again";
                status.style.color = "#ff4b4b";
                document.getElementById("keyInput").style.borderColor = "#ff4b4b";
                
                blocks.forEach(block => {
                    block.classList.remove("unlocked");
                });
            }
        }

        function copyScript(button, scriptText) {
            navigator.clipboard.writeText(scriptText).then(() => {
                const originalText = button.innerText;
                button.innerText = "Copied! ✅";
                button.classList.add("copied");
                
                setTimeout(() => {
                    button.innerText = originalText;
                    button.classList.remove("copied");
                }, 2000);
            }).catch(err => {
                alert("Fehler beim Kopieren: " + err);
            });
        }
    </script>

</body>
</html>
